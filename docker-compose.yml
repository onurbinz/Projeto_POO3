version: "3.9"

services:

  # ============================================================
  # Banco de Dados — PostgreSQL 15
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: erp-barbershop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_admin
      POSTGRES_PASSWORD: erp_secret_2026
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_admin -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  # ============================================================
  # Servidor de Aplicação — WildFly 26.1 (Jakarta EE 8)
  # Build multi-stage: Maven compila → WildFly recebe o WAR
  # ============================================================
  wildfly:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-barbershop-app
    restart: unless-stopped
    ports:
      - "8080:8080"     # HTTP — aplicação
      - "9990:9990"     # Console de administração
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: erp_db
      DB_USER: erp_admin
      DB_PASSWORD: erp_secret_2026
    networks:
      - erp-network

# ==============================================================
# Volumes nomeados para persistência
# ==============================================================
volumes:
  pgdata:
    driver: local

# ==============================================================
# Rede isolada para comunicação entre serviços
# ==============================================================
networks:
  erp-network:
    driver: bridge
